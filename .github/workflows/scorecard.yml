name: OpenSSF Scorecard

# Dogfooding: sota-research scores candidate repos on OpenSSF Scorecard (rubric D4),
# so it runs Scorecard on itself. Results publish to the OpenSSF dashboard + code-scanning.
on:
  branch_protection_rule:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  push:
    branches: ["main"]

# Top-level: least privilege.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code-scanning
      id-token: write # publish_results to the OpenSSF dashboard
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
